<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Panchayat - Modern Housing Society Management System">
  <title>{% block title %}Panchayat{% endblock %}</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <!-- Animate.css -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link href="/static/css/panchayat.css" rel="stylesheet">
  
  <style>
    /* Page transition animations */
    .page-wrapper {
      animation: fadeInUp 0.4s ease;
    }
    
    /* Sidebar animation */
    .sidebar {
      animation: slideInLeft 0.5s ease;
    }
    
    /* Enhanced button hover */
    .btn {
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    .btn:active {
      transform: scale(0.97);
    }
    
    /* Card hover animations */
    .card, .stat-card, .service-card, .complaint-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Loading skeleton animation */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg-light) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    
    /* Toast improvements */
    .toast {
      backdrop-filter: blur(10px);
    }
    
    /* Focus states */
    .form-control:focus, .form-select:focus {
      transition: all 0.2s ease;
    }
    
    /* Nav link active indicator */
    .nav-link.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: white;
      border-radius: 3px;
    }
    
    /* Better modal backdrop */
    .modal-backdrop {
      backdrop-filter: blur(4px);
    }
  </style>
  
  {% block extra_css %}{% endblock %}
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>
  
  <!-- Mobile Toggle Button -->
  <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation">
    <i class="fas fa-bars"></i>
  </button>
  
  {% block content %}{% endblock %}
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Core JS -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/voice-recorder.js"></script>
  <script src="/static/js/bylaw-chat.js"></script>
  
  <script>
    // Auth utilities
    const auth = {
      login: async (email, password) => {
        const res = await api.post('/auth/login/', { email, password });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('panchayat_token', data.data.access);
          localStorage.setItem('panchayat_user', JSON.stringify(data.data.user));
          localStorage.setItem('panchayat_role', data.data.user.role);
        }
        return data;
      },
      
      logout: () => {
        localStorage.removeItem('panchayat_token');
        localStorage.removeItem('panchayat_user');
        localStorage.removeItem('panchayat_role');
        window.location.href = '/login/';
      },
      
      getUser: () => {
        try {
          return JSON.parse(localStorage.getItem('panchayat_user') || 'null');
        } catch {
          return null;
        }
      },
      
      getRole: () => localStorage.getItem('panchayat_role'),
      
      isAuthenticated: () => !!localStorage.getItem('panchayat_token')
    };

    // Auth guard
    function requireAuth() {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login/';
        return false;
      }
      return true;
    }

    // Role-based redirect
    function handleRoleRedirect(role) {
      localStorage.setItem('panchayat_role', role);
      const routes = {
        admin: '/admin-panel/',
        committee: '/committee/',
        resident: '/resident/'
      };
      window.location.href = routes[role] || '/login/';
    }
    
    // Global functions
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('show');
    }
    
    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', function(e) {
      const sidebar = document.querySelector('.sidebar');
      const toggle = document.querySelector('.mobile-toggle');
      if (window.innerWidth <= 1024 && 
          sidebar.classList.contains('show') && 
          !sidebar.contains(e.target) && 
          !toggle.contains(e.target)) {
        sidebar.classList.remove('show');
      }
    });
    
    // Initialize tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl);
    });
  </script>
  
  {% block extra_js %}{% endblock %}
</body>
</html>
